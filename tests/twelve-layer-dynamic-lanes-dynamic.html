<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Lane – 12-Layer GPT-2 Tower</title>
    <style>
        body { margin:0; overflow:hidden; background:#000; }
        #ui { position:fixed;top:10px;left:10px;z-index:10;font-family:monospace;color:#fff; }
        canvas { display:block; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
</head>
<body>
    <div id="ui">
        Lanes: <input type="range" id="laneSlider" min="1" max="20" value="5" /> <span id="laneLabel">5</span>
    </div>
    <canvas id="c"></canvas>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { EXRLoader } from 'three/examples/jsm/loaders/EXRLoader.js';
        import { loadPrecomputedGeometries } from '../src/utils/precomputedGeometryLoader.js';
        import { LayerNormalizationVisualization } from '../src/components/LayerNormalizationVisualization.js';
        import { WeightMatrixVisualization } from '../src/components/WeightMatrixVisualization.js';
        import { InstancedMesh, Matrix4 } from 'three';
        import hdrBackgroundUrl from '../rogland_clear_night_64.exr?url';

        import {
            LN_PARAMS,
            LN_TO_MHA_GAP,
            BRANCH_X,
            LAYER_NORM_1_Y_POS,
            LAYER_NORM_2_Y_POS,
            LN2_TO_MLP_GAP,
            MLP_MATRIX_PARAMS_UP,
            MLP_MATRIX_PARAMS_DOWN,
            NUM_HEAD_SETS_LAYER,
            HEAD_SET_GAP_LAYER,
            MHA_INTERNAL_MATRIX_SPACING,
            MHA_MATRIX_PARAMS,
            VECTOR_DEPTH_SPACING,
            MLP_INTER_MATRIX_GAP,
            INACTIVE_COMPONENT_COLOR
        } from '../src/utils/constants.js';
        import { MHA_FINAL_Q_COLOR, MHA_FINAL_K_COLOR, MHA_FINAL_V_COLOR, MHA_OUTPUT_PROJECTION_MATRIX_COLOR, MHA_OUTPUT_PROJECTION_MATRIX_PARAMS, MHA_OUTPUT_PROJECTION_MATRIX_Y_OFFSET_ABOVE_ROW } from '../src/animations/LayerAnimationConstants.js';

        // Load precomputed geometries that contain just one lane slice.
        // The standard twelve-layer-stack demo uses `precomputed_components.glb`,
        // but here we need the slice variant so we can instance that single slice
        // for each lane when the lane count changes at runtime.
        await loadPrecomputedGeometries('../precomputed_components_slice.glb');

        const LAYER_COUNT = 12;
        const LAYER_VERTICAL_SPACING = 2000; // increased spacing for clarity

        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 1, 40000);
        camera.position.set(4000, 8000, 16000);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // FPS meter
        const stats = new Stats();
        document.body.appendChild(stats.dom);

        // Lighting identical to twelve-layer-stack demo
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5,10,7.5);
        scene.add(dirLight);

        const exrLoader = new EXRLoader().setDataType(THREE.HalfFloatType);
        exrLoader.load(hdrBackgroundUrl, (tex)=>{
            tex.mapping = THREE.EquirectangularReflectionMapping;
            scene.environment = tex;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
        });

        let towerGroup = null;

        function stripCaps(geo, keepFront, keepBack){
            const g = geo.toNonIndexed();
            const pos=g.getAttribute('position').array;
            const nrm=g.getAttribute('normal').array;
            const newPos=[], newNrm=[];
            for(let i=0;i<pos.length;i+=9){
                const nz=(nrm[i+2]+nrm[i+5]+nrm[i+8])/3;
                const isFront = nz>0.9;
                const isBack  = nz<-0.9;
                if((isFront&&!keepFront)||(isBack&&!keepBack)) continue;
                for(let j=0;j<9;j++){newPos.push(pos[i+j]); newNrm.push(nrm[i+j]);}
            }
            const out=new THREE.BufferGeometry();
            out.setAttribute('position', new THREE.Float32BufferAttribute(newPos,3));
            out.setAttribute('normal',   new THREE.Float32BufferAttribute(newNrm,3));
            return out;
        }

        function buildSingleLayer(layerIdx, laneCount){
            const baseY = layerIdx * LAYER_VERTICAL_SPACING;
            const group = new THREE.Group();

            // Shared X-coordinate so LayerNorms, Key matrices, MLP blocks and
            // the Output-Projection matrix line up vertically.
            const alignX  = BRANCH_X - MHA_INTERNAL_MATRIX_SPACING + 1.5 * MHA_MATRIX_PARAMS.width; // matches first head's K matrix X

            const ln1CenterY = baseY + LAYER_NORM_1_Y_POS;
            const ln1TopY    = ln1CenterY + LN_PARAMS.height/2;
            const mhaCenterY = ln1TopY + LN_TO_MHA_GAP + MHA_MATRIX_PARAMS.height/2;
            const ln2CenterY = baseY + LAYER_NORM_2_Y_POS;
            const ln2TopY    = ln2CenterY + LN_PARAMS.height/2;
            const mlpUpCenterY   = ln2TopY + LN2_TO_MLP_GAP + MLP_MATRIX_PARAMS_UP.height/2;
            const mlpDownCenterY = mlpUpCenterY + MLP_MATRIX_PARAMS_UP.height/2 + MLP_INTER_MATRIX_GAP + MLP_MATRIX_PARAMS_DOWN.height/2;

            const lnColour = new THREE.Color(0xffffff);
            const orange   = new THREE.Color(0xc07a12);

            // LN-1 as InstancedMesh
            {
                const tmpl = new LayerNormalizationVisualization(new THREE.Vector3(),
                    LN_PARAMS.width,
                    LN_PARAMS.height,
                    VECTOR_DEPTH_SPACING,
                    LN_PARAMS.wallThickness,
                    1,
                    LN_PARAMS.holeWidth,
                    LN_PARAMS.holeWidthFactor);
                const baseGeo = stripCaps(tmpl.mesh.geometry.clone(), false, false);
                const baseMat = tmpl.mesh.material.clone();
                baseMat.color.copy(lnColour);
                baseMat.emissive = lnColour.clone();
                baseMat.emissiveIntensity = 0.2;
                baseMat.transparent = false;
                baseMat.opacity = 1.0;
                const inst = new InstancedMesh(baseGeo, baseMat, laneCount);
                const mtx = new Matrix4();
                for(let i=0;i<laneCount;i++){
                    const z=(i-(laneCount-1)/2)*VECTOR_DEPTH_SPACING;
                    mtx.makeTranslation(alignX, ln1CenterY, z);
                    inst.setMatrixAt(i, mtx);
                }
                tmpl.group.traverse(obj=>{if(obj.material) obj.material.dispose();});
                group.add(inst);
            }

            // Q/K/V matrices as InstancedMesh per colour per head-set per layer
            const singleSetWidth=3*MHA_MATRIX_PARAMS.width;
            const firstQX = BRANCH_X - MHA_INTERNAL_MATRIX_SPACING + MHA_MATRIX_PARAMS.width/2;
            const colours=[MHA_FINAL_Q_COLOR, MHA_FINAL_K_COLOR, MHA_FINAL_V_COLOR];

            // build template geometry/material once
            const wmTemplate = new WeightMatrixVisualization(null,new THREE.Vector3(),MHA_MATRIX_PARAMS.width,MHA_MATRIX_PARAMS.height,VECTOR_DEPTH_SPACING,MHA_MATRIX_PARAMS.topWidthFactor,MHA_MATRIX_PARAMS.cornerRadius,1,MHA_MATRIX_PARAMS.slitWidth,MHA_MATRIX_PARAMS.slitDepthFactor,MHA_MATRIX_PARAMS.slitBottomWidthFactor,MHA_MATRIX_PARAMS.slitTopWidthFactor);
            const wmGeo = wmTemplate.mesh.geometry.clone();
            const capGeo = wmTemplate.frontCapMesh.geometry.clone();
            const capGeoBack = capGeo.clone();
            capGeoBack.rotateY(Math.PI);
            wmTemplate.group.traverse(o=>{if(o.material) o.material.dispose();});
            
            for(let colIdx=0; colIdx<3; colIdx++){
                const mat = wmTemplate.mesh.material.clone();
                const baseColor = new THREE.Color(colours[colIdx]);
                mat.color.copy(baseColor);
                mat.emissive = baseColor.clone();
                mat.emissiveIntensity = 0.2;
                mat.transparent = false;
                mat.opacity = 1.0;
                const inst = new InstancedMesh(wmGeo, mat, NUM_HEAD_SETS_LAYER*laneCount);
                const capMatFront = mat.clone();
                const capMatBack  = mat.clone();
                const frontCaps = new InstancedMesh(capGeo, capMatFront, NUM_HEAD_SETS_LAYER);
                const backCaps  = new InstancedMesh(capGeoBack, capMatBack,  NUM_HEAD_SETS_LAYER);
                const mtx=new Matrix4();
                let instanceId = 0;
                for(let head=0; head<NUM_HEAD_SETS_LAYER; head++){
                    const setOffsetX = head*(singleSetWidth+HEAD_SET_GAP_LAYER);
                    const x = firstQX + setOffsetX + colIdx*MHA_MATRIX_PARAMS.width;
                    // Back cap (first slice)
                    let backZ = (-(laneCount-1)/2)*VECTOR_DEPTH_SPACING - VECTOR_DEPTH_SPACING/2 - 0.05;
                    mtx.makeTranslation(x, mhaCenterY, backZ);
                    backCaps.setMatrixAt(head, mtx);
                    // Front cap (last slice)
                    let frontZ = ((laneCount-1)/2)*VECTOR_DEPTH_SPACING + VECTOR_DEPTH_SPACING/2 + 0.05;
                    mtx.makeTranslation(x, mhaCenterY, frontZ);
                    frontCaps.setMatrixAt(head, mtx);
                    for(let i=0;i<laneCount;i++){
                        const z=(i-(laneCount-1)/2)*VECTOR_DEPTH_SPACING;
                        mtx.makeTranslation(x, mhaCenterY, z);
                        inst.setMatrixAt(instanceId++, mtx);
                    }
                }
                group.add(inst);
                group.add(frontCaps);
                group.add(backCaps);
            }

            // Output-Projection matrix (post-MHSA)
            {
                // Align X with the first head's K matrix (middle of the first QKV triplet)
                const firstKX = firstQX + MHA_MATRIX_PARAMS.width;

                // Calculate geometry dimensions
                const opHeight = MHA_MATRIX_PARAMS.height * MHA_OUTPUT_PROJECTION_MATRIX_PARAMS.heightFactor;

                const temp = new WeightMatrixVisualization(
                    null,
                    new THREE.Vector3(),
                    MHA_OUTPUT_PROJECTION_MATRIX_PARAMS.width,
                    opHeight,
                    VECTOR_DEPTH_SPACING,
                    MHA_OUTPUT_PROJECTION_MATRIX_PARAMS.topWidthFactor,
                    MHA_OUTPUT_PROJECTION_MATRIX_PARAMS.cornerRadius,
                    1,
                    MHA_OUTPUT_PROJECTION_MATRIX_PARAMS.slitWidth,
                    MHA_OUTPUT_PROJECTION_MATRIX_PARAMS.slitDepthFactor,
                    MHA_OUTPUT_PROJECTION_MATRIX_PARAMS.slitBottomWidthFactor,
                    MHA_OUTPUT_PROJECTION_MATRIX_PARAMS.slitTopWidthFactor
                );

                const geo = temp.mesh.geometry.clone();
                const capGeo = temp.frontCapMesh.geometry.clone();
                const capGeoBack = capGeo.clone();
                capGeoBack.rotateY(Math.PI);

                const opColor = new THREE.Color(MHA_OUTPUT_PROJECTION_MATRIX_COLOR);
                const mat = temp.mesh.material.clone();
                mat.color.copy(opColor);
                mat.emissive = opColor.clone();
                mat.emissiveIntensity = 0.3;
                mat.transparent = false;
                mat.opacity = 1.0;

                const inst = new InstancedMesh(geo, mat, laneCount);
                const frontCaps = new InstancedMesh(capGeo, mat.clone(), 1);
                const backCaps  = new InstancedMesh(capGeoBack, mat.clone(), 1);

                // Y-position: derived from MHSA top plus intermediate offsets (matches animation logic)
                const opCenterY = mhaCenterY + MHA_MATRIX_PARAMS.height / 2 + 20 + 60 + 60 + MHA_OUTPUT_PROJECTION_MATRIX_Y_OFFSET_ABOVE_ROW + opHeight / 2;

                const mtx = new Matrix4();
                for (let i = 0; i < laneCount; i++) {
                    const z = (i - (laneCount - 1) / 2) * VECTOR_DEPTH_SPACING;
                    mtx.makeTranslation(firstKX, opCenterY, z);
                    inst.setMatrixAt(i, mtx);
                }

                // Caps – one slice front & back
                mtx.makeTranslation(firstKX, opCenterY, ((laneCount - 1) / 2) * VECTOR_DEPTH_SPACING + VECTOR_DEPTH_SPACING / 2 + 0.05);
                frontCaps.setMatrixAt(0, mtx);
                mtx.makeTranslation(firstKX, opCenterY, (-(laneCount - 1) / 2) * VECTOR_DEPTH_SPACING - VECTOR_DEPTH_SPACING / 2 - 0.05);
                backCaps.setMatrixAt(0, mtx);

                // Dispose temporary materials/geometries to free memory
                temp.group.traverse(o => { if (o.material) o.material.dispose(); });

                group.add(inst);
                group.add(frontCaps);
                group.add(backCaps);
            }

            // LN-2 instanced
            {
                const tmpl = new LayerNormalizationVisualization(new THREE.Vector3(),
                    LN_PARAMS.width,
                    LN_PARAMS.height,
                    VECTOR_DEPTH_SPACING,
                    LN_PARAMS.wallThickness,
                    1,
                    LN_PARAMS.holeWidth,
                    LN_PARAMS.holeWidthFactor);
                const geo = stripCaps(tmpl.mesh.geometry.clone(), false, false);
                const mat = tmpl.mesh.material.clone();
                mat.color.copy(lnColour);
                mat.emissive = lnColour.clone();
                mat.emissiveIntensity = 0.2;
                mat.transparent = false;
                mat.opacity = 1.0;
                const inst = new InstancedMesh(geo, mat, laneCount);
                const mtx=new Matrix4();
                for(let i=0;i<laneCount;i++){
                    const z=(i-(laneCount-1)/2)*VECTOR_DEPTH_SPACING;
                    mtx.makeTranslation(alignX, ln2CenterY, z);
                    inst.setMatrixAt(i, mtx);
                }
                tmpl.group.traverse(o=>{if(o.material) o.material.dispose();});
                group.add(inst);
            }

            // MLP Up & Down instanced
            const mlpTemplates=[{y:mlpUpCenterY,params:MLP_MATRIX_PARAMS_UP},{y:mlpDownCenterY,params:MLP_MATRIX_PARAMS_DOWN}];
            mlpTemplates.forEach(({y,params})=>{
                const temp=new WeightMatrixVisualization(null,new THREE.Vector3(),params.width,params.height,VECTOR_DEPTH_SPACING,params.topWidthFactor,params.cornerRadius,1,params.slitWidth,params.slitDepthFactor,params.slitBottomWidthFactor,params.slitTopWidthFactor);
                const geo=temp.mesh.geometry.clone();
                const capGeo=temp.frontCapMesh.geometry.clone();
                const capGeoBack=capGeo.clone();
                capGeoBack.rotateY(Math.PI);
                const mat=temp.mesh.material.clone();
                mat.color.copy(orange);
                mat.emissive=orange.clone();
                mat.emissiveIntensity=0.3;
                mat.transparent = false;
                mat.opacity = 1.0;
                const inst=new InstancedMesh(geo, mat, laneCount);
                const frontCaps=new InstancedMesh(capGeo, mat.clone(), 1);
                const backCaps =new InstancedMesh(capGeoBack, mat.clone(), 1);
                const mtx=new Matrix4();
                for(let i=0;i<laneCount;i++){
                    const z=(i-(laneCount-1)/2)*VECTOR_DEPTH_SPACING;
                    mtx.makeTranslation(alignX, y, z);
                    inst.setMatrixAt(i, mtx);
                }
                // Caps
                mtx.makeTranslation(alignX, y, ((laneCount-1)/2)*VECTOR_DEPTH_SPACING + VECTOR_DEPTH_SPACING/2 + 0.05);
                frontCaps.setMatrixAt(0, mtx);
                mtx.makeTranslation(alignX, y, (-(laneCount-1)/2)*VECTOR_DEPTH_SPACING - VECTOR_DEPTH_SPACING/2 - 0.05);
                backCaps.setMatrixAt(0, mtx);
                temp.group.traverse(o=>{if(o.material) o.material.dispose();});
                group.add(inst);
                group.add(frontCaps);
                group.add(backCaps);
            });

            return group;
        }

        function rebuildTower(laneCount){
            if(towerGroup){ scene.remove(towerGroup);} 
            towerGroup = new THREE.Group();
            for(let layer=0; layer<LAYER_COUNT; layer++){
                const layerGrp=buildSingleLayer(layer, laneCount);
                towerGroup.add(layerGrp);
            }
            scene.add(towerGroup);
        }

        const slider=document.getElementById('laneSlider');
        const label=document.getElementById('laneLabel');
        rebuildTower(parseInt(slider.value,10));
        slider.addEventListener('input', ()=>{
            const n=parseInt(slider.value,10);
            label.textContent=n;
            rebuildTower(n);
        });

        window.addEventListener('resize', ()=>{
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect=window.innerWidth/window.innerHeight;
            camera.updateProjectionMatrix();
        });

        (function animate(){
            requestAnimationFrame(animate);
            controls.update();
            stats.update();
            renderer.render(scene,camera);
        })();

    </script>
</body>
</html>
