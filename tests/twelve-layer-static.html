<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>12-Layer GPT-2 Stack – Static Colour Picker Demo</title>
    <style>
        body { margin: 0; overflow: hidden; background:#111; }
        canvas { display:block; }
        /* dat.GUI fixes */
        .dg.ac { z-index: 10 !important; }
    </style>
</head>
<body>
    <canvas id="gptCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
    <!-- Three.js & helpers -->
    <script type="module">
        import * as THREE from 'three';
        import { CoreEngine } from '../src/engine/CoreEngine.js';
        import Gpt2Layer from '../src/engine/layers/Gpt2Layer.js';
        import { createRandomSource } from '../src/data/RandomActivationSource.js';
        import { MHA_FINAL_Q_COLOR, MHA_FINAL_K_COLOR, MHA_FINAL_V_COLOR, MHA_OUTPUT_PROJECTION_MATRIX_COLOR } from '../src/animations/LayerAnimationConstants.js';

        // ------------------------------------------------------------
        // Initialise static 12-layer stack (no vectors / no animation)
        // ------------------------------------------------------------
        const NUM_LAYERS = 12;
        const layers = [];
        for (let i = 0; i < NUM_LAYERS; i++) {
            const rand = createRandomSource();
            const layer = new Gpt2Layer(i, rand, 0, /*externalLanes*/null, /*onFinished*/null, /*isActive*/false);
            layers.push(layer);
        }

        const camPos    = new THREE.Vector3(0, 11000, 16000);
        const camTarget = new THREE.Vector3(0, 9000, 0);

        const engine = new CoreEngine(document.getElementById('gptCanvas'), layers, {
            cameraPosition: camPos,
            cameraTarget:   camTarget,
            enableBloom:    false,
        });

        // ------------------------------------------------------------
        // Colour management helpers
        // ------------------------------------------------------------
        const defaultColours = {
            queryHeads:       `#${MHA_FINAL_Q_COLOR.toString(16).padStart(6,'0')}`,
            keyHeads:         `#${MHA_FINAL_K_COLOR.toString(16).padStart(6,'0')}`,
            valueHeads:       `#${MHA_FINAL_V_COLOR.toString(16).padStart(6,'0')}`,
            outputProjection: `#${MHA_OUTPUT_PROJECTION_MATRIX_COLOR.toString(16).padStart(6,'0')}`,
            layerNorms:       '#ffff99', // light yellow
            mlpUp:            '#b07c13', // orange
            mlpDown:          '#b07c13', // same orange
        };
        const colours = { ...defaultColours };

        // ------------------------------------------------------------
        // Global material parameters (shared across every component)
        // ------------------------------------------------------------
        const materialSettings = {
            metalness: 0.15,
            roughness: 0.6,
            emissiveIntensity: 0.5,
            opacity: 0.85,
            materialType: 'Standard', // MeshStandardMaterial by default
        };

        // ------------------------------------------------------------
        // Helpers
        // ------------------------------------------------------------
        // Helper to safely set colour & emissive on either WeightMatrix or LayerNorm visualisations
        function setComponentColour(component, colour) {
            if (!component) return;
            if (component.setColor) component.setColor(colour);
            // WeightMatrixVisualization implements setEmissive; LayerNorm does not.
            const emissiveInt = materialSettings.emissiveIntensity;
            // Apply emissive only if the underlying material supports it
            const sampleMesh = component.mesh || component.frontCapMesh || component.backCapMesh;
            let supportsEmissive = false;
            if (sampleMesh) {
                const mat = Array.isArray(sampleMesh.material) ? sampleMesh.material[0] : sampleMesh.material;
                supportsEmissive = mat && mat.emissive !== undefined;
            }

            // Optionally adjust emissive colour on materials that support it
            if (supportsEmissive) {
                const mats = [component.mesh, component.frontCapMesh, component.backCapMesh]
                    .filter(Boolean)
                    .flatMap(m => Array.isArray(m.material) ? m.material : [m.material]);
                mats.forEach(mat => {
                    if (mat && mat.emissive !== undefined) {
                        mat.emissive.set(colour);
                        mat.emissiveIntensity = emissiveInt;
                    }
                });
            }
        }

        // Apply shared material properties (metalness, roughness, opacity …)
        function applyMaterialProps(component) {
            if (!component || typeof component.setMaterialProperties !== 'function') return;

            // Map material type to THREE constructor
            const typeMap = {
                'Standard': THREE.MeshStandardMaterial,
                'Phong': THREE.MeshPhongMaterial,
                'Lambert': THREE.MeshLambertMaterial,
                'Basic': THREE.MeshBasicMaterial,
                'Physical': THREE.MeshPhysicalMaterial,
            };

            const TargetMat = typeMap[materialSettings.materialType] || THREE.MeshStandardMaterial;

            // Helper to update or replace a mesh's material
            const updateMeshMaterial = (mesh) => {
                if (!mesh) return;
                const current = Array.isArray(mesh.material) ? mesh.material[0] : mesh.material;
                if (!(current instanceof TargetMat)) {
                    const baseColor = current?.color ? current.color.clone() : new THREE.Color(0xffffff);
                    const newMat = new TargetMat({ color: baseColor });
                    mesh.material = newMat;
                }
                const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
                mats.forEach((mat) => {
                    if ('metalness' in mat) mat.metalness = materialSettings.metalness;
                    if ('roughness' in mat) mat.roughness = materialSettings.roughness;
                    if ('emissiveIntensity' in mat) mat.emissiveIntensity = materialSettings.emissiveIntensity;
                    mat.opacity = materialSettings.opacity;
                    mat.transparent = materialSettings.opacity < 1;
                });
            };

            // Common meshes to touch
            updateMeshMaterial(component.mesh);
            updateMeshMaterial(component.frontCapMesh);
            updateMeshMaterial(component.backCapMesh);

            component.setMaterialProperties({
                metalness: materialSettings.metalness,
                roughness: materialSettings.roughness,
                emissiveIntensity: materialSettings.emissiveIntensity,
                opacity: materialSettings.opacity,
                transparent: materialSettings.opacity < 1,
            });
        }

        function applyColours() {
            // Convert hex strings to THREE.Color once per update
            const qCol  = new THREE.Color(colours.queryHeads);
            const kCol  = new THREE.Color(colours.keyHeads);
            const vCol  = new THREE.Color(colours.valueHeads);
            const outCol= new THREE.Color(colours.outputProjection);
            const lnCol = new THREE.Color(colours.layerNorms);
            const mlpUpCol   = new THREE.Color(colours.mlpUp);
            const mlpDownCol = new THREE.Color(colours.mlpDown);

            for (const layer of layers) {
                // MHSA matrices (Q, K, V)
                const vis = layer.mhsaAnimation?.mhaVisualizations || [];
                for (let i = 0; i < vis.length; i++) {
                    const target = (i % 3 === 0) ? qCol : (i % 3 === 1) ? kCol : vCol;
                    setComponentColour(vis[i], target);
                    applyMaterialProps(vis[i]);
                }

                // Output projection matrix
                if (layer.mhsaAnimation?.outputProjectionMatrix) {
                    setComponentColour(layer.mhsaAnimation.outputProjectionMatrix, outCol);
                    applyMaterialProps(layer.mhsaAnimation.outputProjectionMatrix);
                }

                // LayerNorms (share colour)
                setComponentColour(layer.ln1, lnCol);
                setComponentColour(layer.ln2, lnCol);
                applyMaterialProps(layer.ln1);
                applyMaterialProps(layer.ln2);

                // MLP matrices
                setComponentColour(layer.mlpUp,   mlpUpCol);
                setComponentColour(layer.mlpDown, mlpDownCol);
                applyMaterialProps(layer.mlpUp);
                applyMaterialProps(layer.mlpDown);
            }
        }

        // Helper: repeatedly apply colours a few times during the first second to
        // catch any late-built meshes (CSG generation can take >1 frame).
        const applyWithRetries = () => {
            let attempts = 0;
            const maxAttempts = 20;             // ~1 s (20 × 50 ms)
            const id = setInterval(() => {
                applyColours();
                if (++attempts >= maxAttempts) clearInterval(id);
            }, 50);
        };

        // Kick off after initial render
        requestAnimationFrame(() => {
            applyWithRetries();
        });

        // ------------------------------------------------------------
        // GUI – live colour pickers
        // ------------------------------------------------------------
        const gui = new window.dat.GUI({ width: 320 });
        gui.domElement.style.zIndex = 5;

        gui.addColor(colours, 'queryHeads').name('Query Heads').onChange(applyColours);
        gui.addColor(colours, 'keyHeads').name('Key Heads').onChange(applyColours);
        gui.addColor(colours, 'valueHeads').name('Value Heads').onChange(applyColours);
        gui.addColor(colours, 'outputProjection').name('Output Projection').onChange(applyColours);
        gui.addColor(colours, 'layerNorms').name('LayerNorms').onChange(applyColours);
        gui.addColor(colours, 'mlpUp').name('MLP Up-Proj').onChange(applyColours);
        gui.addColor(colours, 'mlpDown').name('MLP Down-Proj').onChange(applyColours);

        // Material folder
        const matFolder = gui.addFolder('Material');
        matFolder.add(materialSettings, 'materialType', ['Standard','Phong','Lambert','Basic','Physical']).name('Type').onChange(applyColours);
        matFolder.add(materialSettings, 'metalness', 0, 1, 0.01).onChange(applyColours);
        matFolder.add(materialSettings, 'roughness', 0, 1, 0.01).onChange(applyColours);
        matFolder.add(materialSettings, 'emissiveIntensity', 0, 5, 0.05).onChange(applyColours);
        matFolder.add(materialSettings, 'opacity', 0, 1, 0.01).onChange(applyColours);
        matFolder.open();

        // Optional: reset button
        gui.add({ reset: () => { Object.assign(colours, defaultColours); applyColours(); gui.updateDisplay(); } }, 'reset').name('Reset Defaults');

        // Cleanup on unload
        window.addEventListener('beforeunload', () => engine.dispose());
    </script>
</body>
</html>
