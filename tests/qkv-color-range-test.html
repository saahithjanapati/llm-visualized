<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QKV Hue-Range Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-1: #f6f1e7;
            --bg-2: #e6eef7;
            --panel: #ffffff;
            --ink: #1f2530;
            --muted: #5b6677;
            --border: #d6dde8;
            --shadow: rgba(18, 24, 38, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at 15% 15%, #fff2da, transparent 45%),
                        radial-gradient(circle at 85% 10%, #dfe9ff, transparent 55%),
                        linear-gradient(140deg, var(--bg-1), var(--bg-2));
            min-height: 100vh;
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 28px 48px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
            letter-spacing: 0.02em;
        }

        p {
            margin: 0 0 18px;
            color: var(--muted);
            line-height: 1.5;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: 0 14px 30px var(--shadow);
        }

        .config {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px 16px;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 18px;
        }

        .rows {
            display: grid;
            gap: 18px;
        }

        .row {
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px 12px;
            background: #fbfcff;
        }

        .row-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .base-swatch {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.12);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
            flex: 0 0 auto;
        }

        .meta {
            font-weight: 400;
            color: var(--muted);
            margin-left: 4px;
        }

        .key-swatches,
        .swatches {
            display: grid;
            grid-template-columns: repeat(var(--count), 1fr);
            gap: 2px;
            border-radius: 10px;
            overflow: hidden;
            background: #eff3f9;
            border: 1px solid #e3e8f2;
        }

        .key-swatches {
            margin-bottom: 6px;
        }

        .key-swatch {
            height: 12px;
        }

        .swatch {
            height: 22px;
        }

        .axis {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--muted);
            margin-top: 6px;
        }

        .footer {
            margin-top: 18px;
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main>
        <h1>QKV Hue-Range Test</h1>
        <p>Visualizes the hue-range mapping used for Q, K, and V pass-through vectors.</p>
        <div class="panel">
            <div class="config" id="config"></div>
            <div class="rows" id="rows"></div>
            <div class="footer">Base hues match the final head tints; V uses the value-spectrum base color.</div>
        </div>
    </main>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { buildHueRangeOptions, mapValueToHueRange } from '../src/utils/colors.js';
        import {
            MHA_FINAL_Q_COLOR,
            MHA_FINAL_K_COLOR,
            MHA_VALUE_SPECTRUM_COLOR,
            MHA_VALUE_HUE_SPREAD,
            MHA_VALUE_LIGHTNESS_MIN,
            MHA_VALUE_LIGHTNESS_MAX,
            MHA_VALUE_RANGE_MIN,
            MHA_VALUE_RANGE_MAX,
            MHA_VALUE_CLAMP_MAX,
            MHA_VALUE_KEY_COLOR_COUNT
        } from '../src/animations/LayerAnimationConstants.js';

        // Keep these in sync with src/animations/mhsa/VectorMatrixPassThrough.js
        const CONFIG = {
            hueSpread: MHA_VALUE_HUE_SPREAD,
            minLightness: MHA_VALUE_LIGHTNESS_MIN,
            maxLightness: MHA_VALUE_LIGHTNESS_MAX,
            valueMin: MHA_VALUE_RANGE_MIN,
            valueMax: MHA_VALUE_RANGE_MAX,
            valueClampMax: MHA_VALUE_CLAMP_MAX,
            keyColors: MHA_VALUE_KEY_COLOR_COUNT,
            samples: 64,
        };

        const ROWS = [
            { key: 'Q', label: 'Query (Q)', base: MHA_FINAL_Q_COLOR },
            { key: 'K', label: 'Key (K)', base: MHA_FINAL_K_COLOR },
            { key: 'V', label: 'Value (V)', base: MHA_VALUE_SPECTRUM_COLOR },
        ];

        const configEl = document.getElementById('config');
        const rowsEl = document.getElementById('rows');

        const formatHex = (value) => `#${value.toString(16).padStart(6, '0')}`;

        function lerp(a, b, t) {
            return a + (b - a) * t;
        }

        function buildRow(entry) {
            const section = document.createElement('section');
            section.className = 'row';

            const header = document.createElement('div');
            header.className = 'row-header';

            const baseSwatch = document.createElement('span');
            baseSwatch.className = 'base-swatch';
            baseSwatch.style.background = new THREE.Color(entry.base).getStyle();
            baseSwatch.title = `Base tint ${formatHex(entry.base)}`;

            const title = document.createElement('div');
            title.textContent = entry.label;

            const meta = document.createElement('span');
            meta.className = 'meta';
            meta.textContent = formatHex(entry.base);

            header.appendChild(baseSwatch);
            header.appendChild(title);
            header.appendChild(meta);

            const options = buildHueRangeOptions(entry.base, {
                hueSpread: CONFIG.hueSpread,
                minLightness: CONFIG.minLightness,
                maxLightness: CONFIG.maxLightness,
                valueMin: CONFIG.valueMin,
                valueMax: CONFIG.valueMax,
                valueClampMax: CONFIG.valueClampMax,
            });

            const keyRow = document.createElement('div');
            keyRow.className = 'key-swatches';
            keyRow.style.setProperty('--count', CONFIG.keyColors);

            for (let i = 0; i < CONFIG.keyColors; i += 1) {
                const t = CONFIG.keyColors === 1 ? 0.5 : i / (CONFIG.keyColors - 1);
                const value = lerp(CONFIG.valueMin, CONFIG.valueMax, t);
                const color = mapValueToHueRange(value, options);
                const swatch = document.createElement('div');
                swatch.className = 'key-swatch';
                swatch.style.background = color.getStyle();
                swatch.title = `${entry.key} key ${value.toFixed(2)}`;
                keyRow.appendChild(swatch);
            }

            const bar = document.createElement('div');
            bar.className = 'swatches';
            bar.style.setProperty('--count', CONFIG.samples);

            for (let i = 0; i < CONFIG.samples; i += 1) {
                const t = CONFIG.samples === 1 ? 0.5 : i / (CONFIG.samples - 1);
                const value = lerp(CONFIG.valueMin, CONFIG.valueMax, t);
                const color = mapValueToHueRange(value, options);
                const swatch = document.createElement('div');
                swatch.className = 'swatch';
                swatch.style.background = color.getStyle();
                swatch.title = `${entry.key} value ${value.toFixed(2)}`;
                bar.appendChild(swatch);
            }

            const axis = document.createElement('div');
            axis.className = 'axis';
            axis.innerHTML = `<span>${CONFIG.valueMin}</span><span>0</span><span>${CONFIG.valueMax}</span>`;

            section.appendChild(header);
            section.appendChild(keyRow);
            section.appendChild(bar);
            section.appendChild(axis);

            return section;
        }

        function render() {
            configEl.innerHTML = `
                <div>Hue spread: ${CONFIG.hueSpread}</div>
                <div>Lightness: ${CONFIG.minLightness} to ${CONFIG.maxLightness}</div>
                <div>Value range: ${CONFIG.valueMin} to ${CONFIG.valueMax}</div>
                <div>Color clamp max: ${CONFIG.valueClampMax}</div>
                <div>Key colors: ${CONFIG.keyColors}</div>
                <div>Samples: ${CONFIG.samples}</div>
            `;

            rowsEl.innerHTML = '';
            ROWS.forEach((entry) => {
                rowsEl.appendChild(buildRow(entry));
            });
        }

        render();
    </script>
</body>
</html>
