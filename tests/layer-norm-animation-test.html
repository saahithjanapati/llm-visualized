<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LayerNorm Animation Test</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        canvas { display: block; }
    </style>
</head>
<body>
    <!-- We supply a canvas so the animation can render into it directly -->
    <canvas id="renderCanvas"></canvas>

    <script type="module">
        import { initLayerNormAnimation } from '../src/animations/LayerNormAnimation.js';

        const canvas = document.getElementById('renderCanvas');
        // Start the scene and keep the cleanup function so we can dispose later if needed
        const cleanup = initLayerNormAnimation(canvas);

        window.addEventListener('beforeunload', () => {
            if (typeof cleanup === 'function') cleanup();
        });
    </script>
</body>
</html>
