<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test – 12-Layer GPT-2 Stack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Rajdhani:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../public/twelve-layer-stack.css">
    <!-- KaTeX for equation rendering (fallbacks to plain text if blocked) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
</head>
<body>
    <!-- Layered holographic background -->
    <div class="bg-layer bg-stars" aria-hidden="true"></div>
    <div class="bg-layer bg-grid" aria-hidden="true"></div>
    <div class="bg-layer bg-vignette" aria-hidden="true"></div>

    <!-- Loading GIF overlay -->
    <img id="loadingGif" src="../cool-fun.gif" alt="Loading animation" />
    <!-- Status overlay (top-right) -->
    <div id="statusOverlay" class="hud-panel" aria-live="polite">Layer 1 / 12
Stage: Loading</div>
    <!-- Settings button (top-right) -->
    <button id="settingsBtn" class="hud-button" aria-haspopup="dialog" aria-controls="settingsOverlay" title="Settings">⚙️</button>

    <!-- Blurred modal overlay -->
    <div id="settingsOverlay" aria-hidden="true">
        <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
            <div class="settings-header">
                <div id="settingsTitle" class="settings-title">Settings</div>
                <button id="settingsClose" aria-label="Close settings">×</button>
            </div>
            <div class="settings-content">
                <div class="settings-section">
                    <label class="section-label">Playback speed</label>
                    <div class="speed-group" role="radiogroup" aria-label="Playback speed">
                        <label class="speed-option" data-value="slow">
                            <input type="radio" name="playbackSpeed" value="slow">
                            Slow
                        </label>
                        <label class="speed-option" data-value="medium">
                            <input type="radio" name="playbackSpeed" value="medium">
                            Medium
                        </label>
                        <label class="speed-option" data-value="fast">
                            <input type="radio" name="playbackSpeed" value="fast" checked>
                            Fast
                        </label>
                    </div>
                </div>
                <div class="settings-section">
                    <label class="section-label">Interaction</label>
                    <label class="toggle-row">
                        <input id="toggleRaycast" type="checkbox" checked>
                        Enable hover labels (raycasting)
                    </label>
                </div>
                <div class="settings-section">
                    <label class="section-label">Display</label>
                    <label class="toggle-row">
                        <input id="toggleEquations" type="checkbox" checked>
                        Show equations overlay
                    </label>
                    <label class="toggle-row">
                        <input id="toggleHdrBackground" type="checkbox">
                        Show HDRI background
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Intro text animation canvas (on top) -->
    <canvas id="introCanvas" class="scene-canvas intro" aria-hidden="true"></canvas>
    <!-- GPT-2 tower canvas (below) -->
    <canvas id="gptCanvas" class="scene-canvas main" aria-hidden="true"></canvas>

    <!-- Equations overlay (under status overlay) -->
    <div id="equationsPanel" aria-live="polite">
        <div class="eq-title" id="equationsTitle">Equations</div>
        <div class="eq-body" id="equationsBody"></div>
    </div>

    <!-- Global TWEEN.js for animations -->
    <script src="https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.umd.js"></script>
    <!-- Stats.js for FPS / frame time monitoring -->
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>

    <script type="module" src="./twelve-layer-stack.js"></script>
</body>
</html>
