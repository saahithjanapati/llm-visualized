<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test – 12-Layer GPT-2 Stack</title>
    <link rel="stylesheet" href="../public/twelve-layer-stack.css">
    <!-- KaTeX for equation rendering (fallbacks to plain text if blocked) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
</head>
<body>
    <!-- Loading GIF overlay -->
    <img id="loadingGif" src="../cool-fun.gif" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:4;max-width:30%;height:auto;" />
    <!-- Auto-camera debug overlay -->
    <div id="cameraOffsetOverlay" style="position:fixed;bottom:20px;right:10px;padding:8px 12px;font-family:monospace;font-size:13px;color:#fff;background:rgba(12,12,12,0.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);border-radius:8px;pointer-events:none;z-index:5;white-space:pre;display:none;">Offset vs Residual Lane 2\nΔx: —\nΔy: —\nΔz: —</div>
    <!-- Top-right controls -->
    <div id="topControls">
        <button id="pauseBtn" type="button" aria-pressed="false" aria-label="Pause animation" title="Pause animation">⏸︎</button>
        <div id="skipMenu" data-open="false" data-visible="true">
            <button id="skipMenuToggle" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Skip options" title="Skip options">Skip</button>
            <div id="skipMenuItems" role="menu" aria-label="Skip options">
                <button id="skipLayerBtn" type="button" role="menuitem" aria-label="Skip current layer" title="Skip current layer" data-visible="true">Skip layer</button>
                <button id="skipConveyorBtn" type="button" role="menuitem" aria-label="Skip attention conveyor" title="Skip attention conveyor" data-visible="false">Skip attention</button>
                <button id="skipToEndBtn" type="button" role="menuitem" aria-label="Skip to end of forward pass" title="Skip to end of forward pass" data-visible="true">Skip to end</button>
            </div>
        </div>
        <button id="followModeBtn" type="button" aria-pressed="true" aria-label="Follow mode enabled" title="Follow mode enabled">Follow mode on</button>
        <button id="settingsBtn" type="button" aria-haspopup="dialog" aria-controls="settingsOverlay" title="Settings">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1 1 0 0 0-1.1-.2a1 1 0 0 0-.6.9V20a2 2 0 0 1-4 0v-.1a1 1 0 0 0-.6-.9a1 1 0 0 0-1.1.2l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1 1 0 0 0 .2-1.1a1 1 0 0 0-.9-.6H4a2 2 0 0 1 0-4h.1a1 1 0 0 0 .9-.6a1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1 1 0 0 0 1.1.2a1 1 0 0 0 .6-.9V4a2 2 0 0 1 4 0v.1a1 1 0 0 0 .6.9a1 1 0 0 0 1.1-.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1 1 0 0 0-.2 1.1a1 1 0 0 0 .9.6H20a2 2 0 0 1 0 4h-.1a1 1 0 0 0-.9.6z"></path>
                <circle cx="12" cy="12" r="3.5"></circle>
            </svg>
        </button>
    </div>

    <!-- Consolidated HUD + selection stack -->
    <div id="hudStack">
        <div id="hudPanel" aria-live="polite">
            <div id="statusOverlay">Layer 1 / 12</div>
            <div id="parameterCounter">
                <div class="param-label">Parameters used</div>
                <div class="param-value" id="paramValue">0.00 M</div>
            </div>
            <div id="equationsPanel" aria-live="polite">
                <div class="eq-title" id="equationsTitle">Equations</div>
                <div class="eq-body" id="equationsBody"></div>
            </div>
        </div>

        <!-- Detail side panel (click an object to open) -->
        <aside id="detailPanel" aria-hidden="true">
            <div class="detail-header">
                <div id="detailTitle" class="detail-title">Selection</div>
                <button id="detailClose" type="button" aria-label="Close details">×</button>
            </div>
            <div class="detail-preview">
                <canvas id="detailCanvas"></canvas>
            </div>
            <div id="detailDescription" class="detail-description"></div>
            <div id="detailAttention" class="detail-attention" aria-hidden="true">
                <div class="detail-attention-header">
                    <div class="detail-attention-title">Attention scores</div>
                    <label class="toggle-row detail-attention-toggle">
                        <span class="toggle-text">Post-softmax</span>
                        <input id="detailAttentionToggle" type="checkbox" />
                        <span class="toggle-track" aria-hidden="true"></span>
                    </label>
                </div>
                <div class="detail-attention-grid">
                    <div class="attention-corner"></div>
                    <div class="attention-axis-label attention-axis-label--top">Target Token</div>
                    <div class="attention-axis-label attention-axis-label--left">Source Token</div>
                    <div id="detailAttentionTokensTop" class="attention-tokens attention-tokens-top"></div>
                    <div id="detailAttentionTokensLeft" class="attention-tokens attention-tokens-left"></div>
                    <div id="detailAttentionMatrix" class="attention-matrix"></div>
                </div>
                <div id="detailAttentionEmpty" class="attention-empty">No attention scores available.</div>
                <div id="detailAttentionNote" class="attention-note"></div>
                <div id="detailAttentionValue" class="attention-value"></div>
                <div class="attention-legend" aria-hidden="true">
                    <span id="detailAttentionLegendLow" class="attention-legend-label">-2</span>
                    <div id="detailAttentionLegend" class="attention-legend-bar" data-mid="0"></div>
                    <span id="detailAttentionLegendHigh" class="attention-legend-label">+2</span>
                </div>
            </div>
            <div class="detail-meta">
                <div class="detail-row">
                    <span class="detail-label">Parameters</span>
                    <span id="detailParams" class="detail-value">—</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Tensor dims</span>
                    <span id="detailDims" class="detail-value">—</span>
                </div>
            </div>
            <div class="detail-data">
                <div class="detail-data-title">Activation data</div>
                <pre id="detailData" class="detail-data-values">Select a vector to see values.</pre>
            </div>
        </aside>
    </div>

    <!-- Blurred modal overlay -->
    <div id="settingsOverlay" aria-hidden="true">
        <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
            <div class="settings-header">
                <div id="settingsTitle" class="settings-title">Settings</div>
                <button id="settingsClose" aria-label="Close settings">×</button>
            </div>
            <div class="settings-content">
                <div class="settings-section">
                    <label class="section-label">Playback speed</label>
                    <div class="speed-group" role="radiogroup" aria-label="Playback speed">
                        <label class="speed-option" data-value="normal">
                            <input type="radio" name="playbackSpeed" value="normal" checked>
                            Normal
                        </label>
                        <label class="speed-option" data-value="fast">
                            <input type="radio" name="playbackSpeed" value="fast">
                            Fast
                        </label>
                    </div>
                </div>
                <div class="settings-section">
                    <label class="section-label">Interaction</label>
                    <label class="toggle-row">
                        <span class="toggle-text">Enable hover labels (raycasting)</span>
                        <input id="toggleRaycast" type="checkbox" checked>
                        <span class="toggle-track" aria-hidden="true"></span>
                    </label>
                    <label class="toggle-row">
                        <span class="toggle-text">Follow active layer with camera</span>
                        <input id="toggleAutoCamera" type="checkbox" checked>
                        <span class="toggle-track" aria-hidden="true"></span>
                    </label>
                </div>
                <div class="settings-section">
                    <label class="section-label">Display</label>
                    <label class="toggle-row">
                        <span class="toggle-text">Show equations overlay</span>
                        <input id="toggleEquations" type="checkbox" checked>
                        <span class="toggle-track" aria-hidden="true"></span>
                    </label>
                    <label class="toggle-row">
                        <span class="toggle-text">Show follow view inspector</span>
                        <input id="toggleFollowViewInspector" type="checkbox">
                        <span class="toggle-track" aria-hidden="true"></span>
                    </label>
                    <label class="toggle-row">
                        <span class="toggle-text">Show camera orbit gizmo</span>
                        <input id="toggleCameraDebug" type="checkbox">
                        <span class="toggle-track" aria-hidden="true"></span>
                    </label>
                    <label class="toggle-row">
                        <span class="toggle-text">Show HDRI background</span>
                        <input id="toggleHdrBackground" type="checkbox">
                        <span class="toggle-track" aria-hidden="true"></span>
                    </label>
                    <label class="toggle-row">
                        <span class="toggle-text">Dev mode (performance overlays)</span>
                        <input id="toggleDevMode" type="checkbox">
                        <span class="toggle-track" aria-hidden="true"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Intro text animation canvas (on top) -->
    <canvas id="introCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:2;"></canvas>
    <!-- GPT-2 tower canvas (below) -->
    <canvas id="gptCanvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;"></canvas>

    <!-- Global TWEEN.js for animations -->
    <script src="https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.umd.js"></script>
    <!-- Stats.js for FPS / frame time monitoring -->
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>

    <script type="module" src="./twelve-layer-stack.js"></script>
</body>
</html>
