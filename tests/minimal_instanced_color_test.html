<!DOCTYPE html>
<html>
<head>
    <title>Minimal Instanced Color Test</title>
    <style>body { margin: 0; } canvas { display: block; }</style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.158.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        let camera, scene, renderer;
        let mesh;

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 5;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222222);

            const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const material = new THREE.MeshBasicMaterial({
                color: 0xffffff, 
                vertexColors: true 
            });

            const instanceCount = 3;
            mesh = new THREE.InstancedMesh(geometry, material, instanceCount);

            const colors = [
                new THREE.Color(1, 0, 0), // Red
                new THREE.Color(0, 1, 0), // Green
                new THREE.Color(0, 0, 1)  // Blue
            ];
            const dummy = new THREE.Object3D();

            for (let i = 0; i < instanceCount; i++) {
                dummy.position.set(i * 1.0 - 1.0, 0, 0); // Spread them out
                dummy.updateMatrix();
                mesh.setMatrixAt(i, dummy.matrix);
                mesh.setColorAt(i, colors[i]);
                console.log(`Setting instance ${i} to color: R=${colors[i].r}, G=${colors[i].g}, B=${colors[i].b}`);
            }

            if (mesh.instanceColor) {
                mesh.instanceColor.needsUpdate = true;
                console.log("mesh.instanceColor.needsUpdate = true");
            } else {
                console.error("mesh.instanceColor is null!");
            }
            

            scene.add(mesh);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
