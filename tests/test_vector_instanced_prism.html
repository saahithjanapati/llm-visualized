<!DOCTYPE html>
<html>
<head>
    <title>Instanced Prism Vector Test</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #111; color: #fff; }
        canvas { display: block; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }
        button {
            background-color: #444;
            color: #fff;
            border: 1px solid #666;
            padding: 8px 12px;
            margin-top: 5px;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div id="controls">
        <button id="randomizeData">Randomize Data</button>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VectorVisualizationInstancedPrism } from '../src/components/VectorVisualizationInstancedPrism.js';

        let scene, camera, renderer, prismVector, controls;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 2000);
            camera.position.set(0, 20, 70); // Adjusted camera for better view of 768 elements

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.9);
            directionalLight.position.set(15, 30, 25);
            scene.add(directionalLight);

            // OrbitControls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 10;
            controls.maxDistance = 500;
            controls.target.set(0, 5, 0); // Adjust target to center the view better

            // Prism Vector Visualization
            prismVector = new VectorVisualizationInstancedPrism(null, new THREE.Vector3(0, 0, 0));
            scene.add(prismVector.group);
            
            // Controls
            document.getElementById('randomizeData').addEventListener('click', () => {
                const newData = [];
                for (let i = 0; i < prismVector.rawData.length; i++) {
                    newData.push(Math.random()); // Simple random data between 0 and 1
                }
                prismVector.updateData(newData);
            });

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
