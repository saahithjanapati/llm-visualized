<!DOCTYPE html>
<html>
<head>
    <title>Instanced Prism Layer Norm Animation Test</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #111; color: #fff; }
        canvas { display: block; }
        #controls {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 10; /* Ensure controls are above GUI if it overlaps */
        }
        button {
            background-color: #444;
            color: #fff;
            border: 1px solid #666;
            padding: 8px 12px;
            margin-top: 5px;
            cursor: pointer;
            border-radius: 3px;
        }
        button:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div id="controls">
        <button id="randomizeData">Randomize Data (Snap)</button>
        <button id="animateNorm">Animate Layer Norm</button> 
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
        import { VectorVisualizationInstancedPrism } from '../src/components/VectorVisualizationInstancedPrism.js';
        import { PrismLayerNormAnimation } from '../src/animations/PrismLayerNormAnimation.js';

        let scene, camera, renderer, prismVector, controls, gui, clock, layerNormAnimation;
        const guiParams = {
            numColorSubsections: 30 // Default value
        };

        init();
        animate(); // Start the animation loop

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            clock = new THREE.Clock(); // Initialize clock

            const aspect = window.innerWidth / window.innerHeight;
            camera = new THREE.PerspectiveCamera(60, aspect, 0.1, 2000);
            camera.position.set(0, 20, 70);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.9);
            directionalLight.position.set(15, 30, 25);
            scene.add(directionalLight);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 10;
            controls.maxDistance = 500;
            controls.target.set(0, 5, 0);

            // Initial data will be generated by the constructor now if null
            prismVector = new VectorVisualizationInstancedPrism(null, new THREE.Vector3(0, 0, 0), guiParams.numColorSubsections);
            scene.add(prismVector.group);
            
            document.getElementById('randomizeData').addEventListener('click', () => {
                const newData = [];
                if (prismVector && prismVector.rawData) {
                    for (let i = 0; i < prismVector.rawData.length; i++) {
                        newData.push(Math.random() * 2 - 1);
                    }
                    prismVector.updateDataAndSnapVisuals(newData);
                }
            });

            document.getElementById('animateNorm').addEventListener('click', () => {
                const newData = [];
                if (prismVector && prismVector.rawData && layerNormAnimation) {
                    for (let i = 0; i < prismVector.rawData.length; i++) {
                        newData.push(Math.random() * 2 - 1);
                    }
                    layerNormAnimation.start(newData);
                }
            });

            gui = new GUI();
            gui.add(guiParams, 'numColorSubsections', 1, 200, 1)
               .name('Color Subsections')
               .onChange((value) => {
                   if (prismVector) {
                       prismVector.updateColorSubsections(value);
                   }
               });

            // Initialize the animation controller
            if (prismVector) {
                layerNormAnimation = new PrismLayerNormAnimation(prismVector);
            }

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();

            if (layerNormAnimation) {
                layerNormAnimation.update(deltaTime);
            }

            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
