<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPT Model Visualization Test</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <script type="importmap">
    {
        "imports": {
            "three": "https://esm.sh/three@0.160.0",
            "three/examples/jsm/controls/OrbitControls.js": "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js",
            "../src/animations/GPTModelVisualization.js": "../src/animations/GPTModelVisualization.js",
            "../src/components/LayerNormalizationVisualization.js": "../src/components/LayerNormalizationVisualization.js",
            "../src/components/WeightMatrixVisualization.js": "../src/components/WeightMatrixVisualization.js"
        }
    }
    </script>

    <script type="module">
        import { initGPTModelVisualization } from '../src/animations/GPTModelVisualization.js';
        const canvas = document.getElementById('renderCanvas');
        const cleanup = initGPTModelVisualization(canvas);
        window.addEventListener('beforeunload', () => {
            if (typeof cleanup === 'function') cleanup();
        });
    </script>
</body>
</html>
