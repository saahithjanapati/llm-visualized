<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rising Vectors Scene Test</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';

        // Import components and utils
        import { VectorVisualization } from '/src/components/VectorVisualization.js';
        import {
            SPAWN_Y,
            DESPAWN_Y,
            SPAWN_X_RANGE,
            SPAWN_Z_RANGE,
            VECTOR_SPEED,
            SPAWN_INTERVAL
        } from '/src/utils/constants.js';

        // Scene setup
        const scene = new THREE.Scene();
        // scene.fog = new THREE.Fog(0x000000, 200, 600);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 60); 
        camera.lookAt(0, 20, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Post-processing Setup
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.2, // strength
            0.4, // radius
            0.85 // threshold - pixels brighter than this value will bloom
        );
        composer.addPass(bloomPass);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(0, 1, 1);
        scene.add(directionalLight);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 20, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = false;
        controls.minDistance = 10;
        controls.maxDistance = 180;

        // --- Keyboard Controls Setup ---
        const keyboardState = {};
        const panSpeed = 0.5; // Adjust panning speed as needed

        document.addEventListener('keydown', (event) => {
            keyboardState[event.code] = true;
        });

        document.addEventListener('keyup', (event) => {
            keyboardState[event.code] = false;
        });

        const vectors = []; // Store instances of VectorVisualization
        let spawnTimer = 0;

        // Handle window resize
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();

            renderer.setSize(width, height);
            composer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // --- Handle Keyboard Panning ---
            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            const right = new THREE.Vector3().crossVectors(camera.up, forward).normalize();
            const up = new THREE.Vector3().crossVectors(forward, right).normalize(); // Ensure 'up' is orthogonal

            let didPan = false;
            const panVector = new THREE.Vector3();

            if (keyboardState['KeyW'] || keyboardState['ArrowUp']) {
                panVector.add(up); // Pan up
                didPan = true;
            }
            if (keyboardState['KeyS'] || keyboardState['ArrowDown']) {
                panVector.sub(up); // Pan down
                didPan = true;
            }
            if (keyboardState['KeyA'] || keyboardState['ArrowLeft']) {
                panVector.sub(right); // Pan left
                didPan = true;
            }
            if (keyboardState['KeyD'] || keyboardState['ArrowRight']) {
                panVector.add(right); // Pan right
                didPan = true;
            }

            if (didPan) {
                panVector.normalize().multiplyScalar(panSpeed);
                camera.position.add(panVector);
                controls.target.add(panVector); // Move the target along with the camera
            }
            // --- End Keyboard Panning ---

            // Spawn new vectors periodically
            spawnTimer++;
            if (spawnTimer > SPAWN_INTERVAL) {
                spawnTimer = 0;

                // Create an instance of VectorVisualization
                const initialPosition = new THREE.Vector3(
                    (Math.random() - 0.5) * SPAWN_X_RANGE,
                    SPAWN_Y,
                    (Math.random() - 0.5) * SPAWN_Z_RANGE
                );
                const newVectorVis = new VectorVisualization(null, initialPosition);
                newVectorVis.speed = VECTOR_SPEED; // Set the speed for this instance

                scene.add(newVectorVis.group); // Add the group to the scene
                vectors.push(newVectorVis); // Store the instance
            }

            // Animate existing vectors
            for (let i = vectors.length - 1; i >= 0; i--) {
                const vectorVis = vectors[i];
                vectorVis.group.position.y += vectorVis.speed; // Move the group

                // Remove vectors that have moved off screen
                if (vectorVis.group.position.y > DESPAWN_Y) {
                    scene.remove(vectorVis.group); // Remove the group from the scene
                    vectorVis.dispose(); // Call dispose to clean up geometries/materials
                    vectors.splice(i, 1); // Remove from the array
                }
            }

            controls.update();
            composer.render();
        }

        animate();
    </script>
</body>
</html>
