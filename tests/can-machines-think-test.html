<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Text – Can Machines Think?</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        canvas { display: block; }
    </style>
</head>
<body>
    <!-- Full-screen render surface -->
    <canvas id="renderCanvas"></canvas>

    <!-- Import map for external / ESM modules used by the visualisation. -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://esm.sh/three@0.160.0",
            "three/examples/jsm/controls/OrbitControls.js": "https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js",
            "three/examples/jsm/loaders/FontLoader.js": "https://esm.sh/three@0.160.0/examples/jsm/loaders/FontLoader.js",
            "three/examples/jsm/geometries/TextGeometry.js": "https://esm.sh/three@0.160.0/examples/jsm/geometries/TextGeometry.js"
        }
    }
    </script>

    <!-- Global TWEEN.js for animations (optional, kept for consistency with other tests) -->
    <script src="https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.umd.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { FontLoader } from 'three/examples/jsm/loaders/FontLoader.js';
        import { TextGeometry } from 'three/examples/jsm/geometries/TextGeometry.js';

        const canvas = document.getElementById('renderCanvas');

        // Typing parameters
        const TEXT = 'Can machines think?';
        const TYPE_DELAY = 120; // milliseconds between characters

        // Hold references for later use
        let cursorMesh;

        // Renderer
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Scene & Camera
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(
            45,
            window.innerWidth / window.innerHeight,
            1,
            20000
        );
        camera.position.set(0, 0, 1500);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7.5);
        scene.add(dirLight);

        // Load font & create ghost-typing text
        const loader = new FontLoader();
        loader.load(
            'https://threejs.org/examples/fonts/helvetiker_regular.typeface.json',
            (font) => {
                const charGroup = new THREE.Group();
                scene.add(charGroup);

                const charMeshes = [];
                const charWidths = [];
                let xOffset = 0;
                const charSpacing = 10; // gap between characters
                const extraCursorGap = 60; // additional gap after the final character

                // Pre-create meshes (initially transparent)
                for (const ch of TEXT) {
                    if (ch === ' ') {
                        // Approximate space width based on font size
                        xOffset += 120;
                        charWidths.push(120);
                        charMeshes.push(null); // placeholder
                        continue;
                    }

                    const geo = new TextGeometry(ch, {
                        font: font,
                        size: 200,
                        height: 40,
                        curveSegments: 8,
                        bevelEnabled: true,
                        bevelThickness: 8,
                        bevelSize: 6,
                        bevelOffset: 0,
                        bevelSegments: 3
                    });

                    geo.computeBoundingBox();
                    const width = geo.boundingBox.max.x - geo.boundingBox.min.x;
                    const mat = new THREE.MeshNormalMaterial({ transparent: true, opacity: 0 });
                    const mesh = new THREE.Mesh(geo, mat);

                    // Position the mesh so that its left edge aligns with xOffset
                    mesh.position.x = xOffset;
                    mesh.position.y = 0;
                    mesh.position.z = 0;

                    charGroup.add(mesh);
                    charMeshes.push(mesh);
                    charWidths.push(width);

                    xOffset += width + charSpacing;
                }

                // Center the entire text block horizontally
                charGroup.position.x = -xOffset / 2 + charSpacing / 2;

                // Compute text height for vertical alignment
                const bounds = new THREE.Box3().setFromObject(charGroup);
                const textHeight = bounds.max.y - bounds.min.y;

                // Create a cursor – thin box geometry matching text height
                const cursorGeo = new THREE.BoxGeometry(15, textHeight, 20);
                const cursorMat = new THREE.MeshBasicMaterial({ color: 0x888888 });
                cursorMesh = new THREE.Mesh(cursorGeo, cursorMat);
                // Align cursor vertically with text (centered)
                cursorMesh.position.set(charGroup.position.x, bounds.min.y + textHeight / 2, 25);
                scene.add(cursorMesh);

                // Typing animation using recursive timeouts
                const revealChar = (index) => {
                    if (index >= charMeshes.length) {
                        // Typing finished – start blinking cursor
                        blinkCursor();
                        return;
                    }

                    const mesh = charMeshes[index];
                    const width = charWidths[index];

                    // Move cursor to next position first to give natural typing feel
                    const gap = (index === charMeshes.length - 1) ? extraCursorGap : charSpacing;
                    new TWEEN.Tween(cursorMesh.position)
                        .to({ x: cursorMesh.position.x + width + gap }, TYPE_DELAY * 0.9)
                        .start();

                    if (mesh) {
                        // Fade in the character
                        new TWEEN.Tween(mesh.material)
                            .to({ opacity: 1 }, TYPE_DELAY)
                            .start();
                    }

                    setTimeout(() => revealChar(index + 1), TYPE_DELAY);
                };

                const blinkCursor = () => {
                    // Blink every 500ms
                    setInterval(() => {
                        cursorMesh.visible = !cursorMesh.visible;
                    }, 500);
                };

                // Kick off typing after small delay
                setTimeout(() => revealChar(0), 500);
            }
        );

        // Handle resize
        window.addEventListener('resize', () => {
            const { innerWidth, innerHeight } = window;
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        // Animation loop
        const animate = () => {
            requestAnimationFrame(animate);
            controls.update();
            if (typeof TWEEN !== 'undefined') TWEEN.update();
            renderer.render(scene, camera);
        };
        animate();

        // Cleanup function (mirrors pattern in other tests)
        const cleanup = () => {
            renderer.dispose();
            scene.traverse((child) => {
                if (child.geometry) child.geometry.dispose();
                if (child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach((m) => m.dispose());
                    } else {
                        child.material.dispose();
                    }
                }
            });
        };

        window.addEventListener('beforeunload', () => {
            if (typeof cleanup === 'function') cleanup();
        });
    </script>
</body>
</html>
