<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector-Matrix Scene Test</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script type="module">
        import { initVectorMatrixScene } from '../src/animations/VectorMatrixScene.js';

        const canvas = document.getElementById('renderCanvas');
        const cleanup = initVectorMatrixScene(canvas);

        // Optional: Handle cleanup if the page is unloaded or script is stopped
        window.addEventListener('beforeunload', () => {
            if (cleanup) {
                cleanup();
            }
        });
    </script>
</body>
</html>
