<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Vector Visualization (Two Prisms)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="info">Top: Prism with shader segments. Bottom: Instanced prism. Drag to rotate.</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- Global Variables ---
        let scene, camera, renderer, prismMesh, material, instancedPrismMesh; // Added instancedPrismMesh
        let controls;

        // --- Data Configuration for First Prism ---
        const ORIGINAL_NUM_VALUES = 768; 
        let originalVectorData = new Float32Array(ORIGINAL_NUM_VALUES);
        const NUM_SEGMENTS_PRISM1 = 128; 
        const SEGMENTS_TEXTURE_HEIGHT_PRISM1 = 1; 
        let segmentDataPrism1 = new Float32Array(NUM_SEGMENTS_PRISM1); 
        let dataTexturePrism1;

        // --- Dimensions for both prisms ---
        const PRISM_LENGTH = 10.0; // X-axis
        const PRISM_HEIGHT = 0.5;  // Y-axis
        const PRISM_DEPTH = 0.5;   // Z-axis

        // --- Configuration for Second (Instanced) Prism ---
        const NUM_INSTANCES_X = 16;
        const NUM_INSTANCES_Y = 2;
        const NUM_INSTANCES_Z = 2;
        const TOTAL_INSTANCES = NUM_INSTANCES_X * NUM_INSTANCES_Y * NUM_INSTANCES_Z;


        // --- Shader Code for First Prism ---
        const vertexShaderPrism1 = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShaderPrism1 = `
            precision highp float;
            varying vec2 vUv;
            uniform sampler2D dataTex;
            uniform float segmentsTextureWidthUniform;
            uniform float segmentsTextureHeightUniform;

            vec3 valueToColor(float value) {
                float r_bright = 0.6 + 0.4 * sin(value * 13.73 + 0.0); 
                float g_bright = 0.6 + 0.4 * sin(value * 11.91 + 1.57 * 0.8);
                float b_bright = 0.6 + 0.4 * sin(value * 17.13 + 3.14 * 1.2);
                return vec3(r_bright, g_bright, b_bright);
            }

            void main() {
                float cellX = floor(vUv.x * segmentsTextureWidthUniform);
                float cellY = floor(vUv.y * segmentsTextureHeightUniform); 
                cellX = clamp(cellX, 0.0, segmentsTextureWidthUniform - 1.0);
                cellY = clamp(cellY, 0.0, segmentsTextureHeightUniform - 1.0);
                vec2 sampleUv = vec2(
                    (cellX + 0.5) / segmentsTextureWidthUniform,
                    (cellY + 0.5) / segmentsTextureHeightUniform
                );
                float value = texture2D(dataTex, sampleUv).r;
                vec3 color = valueToColor(value);
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        // --- Initialization ---
        function init() {
            // Scene
            scene = new THREE.Scene();

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(PRISM_LENGTH * 0.3, PRISM_HEIGHT * 2 + 1, PRISM_LENGTH * 0.5); 
            camera.lookAt(0, -PRISM_HEIGHT / 2, 0); // Look between the two prisms

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // OrbitControls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 1;
            controls.maxDistance = PRISM_LENGTH * 2; 
            controls.target.set(0, -PRISM_HEIGHT / 2, 0); // Target between prisms

            // Generate Original Vector Data
            for (let i = 0; i < ORIGINAL_NUM_VALUES; i++) {
                originalVectorData[i] = Math.random();
            }

            // --- Setup First Prism (Shader-based segments) ---
            const valuesPerSegmentPrism1 = ORIGINAL_NUM_VALUES / NUM_SEGMENTS_PRISM1;
            for (let i = 0; i < NUM_SEGMENTS_PRISM1; i++) {
                const sourceDataIndex = Math.floor(i * valuesPerSegmentPrism1);
                const clampedSourceIndex = Math.min(sourceDataIndex, ORIGINAL_NUM_VALUES - 1);
                segmentDataPrism1[i] = originalVectorData[clampedSourceIndex];
            }
            dataTexturePrism1 = new THREE.DataTexture(segmentDataPrism1, NUM_SEGMENTS_PRISM1, SEGMENTS_TEXTURE_HEIGHT_PRISM1, THREE.RedFormat, THREE.FloatType);
            dataTexturePrism1.needsUpdate = true;
            dataTexturePrism1.minFilter = THREE.NearestFilter; 
            dataTexturePrism1.magFilter = THREE.NearestFilter;
            dataTexturePrism1.wrapS = THREE.ClampToEdgeWrapping; 
            dataTexturePrism1.wrapT = THREE.ClampToEdgeWrapping;

            const geometryPrism1 = new THREE.BoxGeometry(PRISM_LENGTH, PRISM_HEIGHT, PRISM_DEPTH, 
                                                   NUM_SEGMENTS_PRISM1, 1, 1);
            material = new THREE.ShaderMaterial({
                vertexShader: vertexShaderPrism1,
                fragmentShader: fragmentShaderPrism1,
                uniforms: {
                    dataTex: { value: dataTexturePrism1 },
                    segmentsTextureWidthUniform: { value: parseFloat(NUM_SEGMENTS_PRISM1) },
                    segmentsTextureHeightUniform: { value: parseFloat(SEGMENTS_TEXTURE_HEIGHT_PRISM1) }
                },
                side: THREE.DoubleSide 
            });
            prismMesh = new THREE.Mesh(geometryPrism1, material);
            // Position the first prism slightly up
            prismMesh.position.y = PRISM_HEIGHT / 2 + 0.25; 
            scene.add(prismMesh);


            // --- Setup Second Prism (Instanced Mesh) ---
            const smallPrismWidth = PRISM_LENGTH / NUM_INSTANCES_X;
            const smallPrismHeight = PRISM_HEIGHT / NUM_INSTANCES_Y;
            const smallPrismDepth = PRISM_DEPTH / NUM_INSTANCES_Z;

            const instancedGeometry = new THREE.BoxGeometry(smallPrismWidth, smallPrismHeight, smallPrismDepth);
            // Material for instanced mesh - Phong for lighting
            const instancedMaterial = new THREE.MeshPhongMaterial({vertexColors: false}); // vertexColors: false, as three.js handles instanced color internally

            instancedPrismMesh = new THREE.InstancedMesh(instancedGeometry, instancedMaterial, TOTAL_INSTANCES);

            const dummy = new THREE.Object3D(); // Used to set matrix for each instance
            const color = new THREE.Color();    // Used to set color for each instance

            let instanceIdx = 0;
            for (let i = 0; i < NUM_INSTANCES_X; i++) {
                for (let j = 0; j < NUM_INSTANCES_Y; j++) {
                    for (let k = 0; k < NUM_INSTANCES_Z; k++) {
                        // Calculate position for this small prism instance
                        // Positions are relative to the center of the large instanced prism volume
                        const x = (i - (NUM_INSTANCES_X - 1) / 2) * smallPrismWidth;
                        const y = (j - (NUM_INSTANCES_Y - 1) / 2) * smallPrismHeight;
                        const z = (k - (NUM_INSTANCES_Z - 1) / 2) * smallPrismDepth;
                        
                        dummy.position.set(x, y, z);
                        dummy.updateMatrix();
                        instancedPrismMesh.setMatrixAt(instanceIdx, dummy.matrix);

                        // Set a unique color for each instance
                        color.setHSL(Math.random(), 0.7 + Math.random() * 0.3, 0.5 + Math.random() * 0.3); // Random bright-ish HSL
                        instancedPrismMesh.setColorAt(instanceIdx, color);

                        instanceIdx++;
                    }
                }
            }
            instancedPrismMesh.instanceMatrix.needsUpdate = true;
            if (instancedPrismMesh.instanceColor) { // Check if instanceColor exists (it should)
                 instancedPrismMesh.instanceColor.needsUpdate = true;
            }
            
            // Position the second (instanced) prism below the first one
            instancedPrismMesh.position.y = -(PRISM_HEIGHT / 2 + 0.25);
            scene.add(instancedPrismMesh);


            // Lights
            const ambientLight = new THREE.AmbientLight(0x808080); // Slightly increased ambient
            scene.add(ambientLight);
            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.7);
            directionalLight1.position.set(1, 1.5, 1);
            scene.add(directionalLight1);
            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight2.position.set(-1, -0.5, -1); // Add another light from a different angle
            scene.add(directionalLight2);


            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script></body>
</html>
